name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4
      # Rebuild index.html from its source so the deploy can never ship a stale artifact,
      # then fail if the working tree changed — the "never hand-edit index.html" rule made
      # self-policing (manifest §6.4a). A clean tree means index.html == its build output.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/build-reader.mjs
      - name: index.html is in sync with its build source
        run: git diff --exit-code -- index.html
      # SCOPE THE ARTIFACT to the shipped app + its runtime resources only (manifest §4.6).
      # The old 4.0 deploy uploaded the whole repo root (tests, scripts, docs, eval harness).
      # Stage just what index.html loads at runtime: the shell + secondary embedded page, the
      # icons, the vendored UMD deps, the engine it dynamically imports, and the data it fetches.
      - name: Stage the shipped file set
        run: |
          mkdir -p _site
          cp index.html templates.html prompt-flow.html favicon.ico favicon.svg apple-touch-icon.png _site/
          cp -R vendor src data templates _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      # GitHub Pages' deploy API intermittently returns "Deployment failed, try again
      # later" when merges to main land back-to-back (the artifact is valid — the Pages
      # backend is just briefly busy serializing an earlier deployment). Retry a couple
      # of times with a short backoff so a transient hiccup doesn't red-X a green build.
      # The uploaded artifact is reused across attempts, so a retry is just a cheap
      # re-hit of the deploy API. Only the final attempt can fail the job — three
      # consecutive failures is a real problem worth surfacing.
      - uses: actions/deploy-pages@v4
        id: deploy-attempt-1
        continue-on-error: true
      - if: steps.deploy-attempt-1.outcome == 'failure'
        run: sleep 30
      - if: steps.deploy-attempt-1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deploy-attempt-2
        continue-on-error: true
      - if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
        run: sleep 60
      - if: steps.deploy-attempt-1.outcome == 'failure' && steps.deploy-attempt-2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deploy-attempt-3
