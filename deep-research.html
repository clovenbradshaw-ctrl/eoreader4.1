<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f5f6f8">
<title>Deep Research — grounded projection over an append-only log</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  html, body { margin: 0; height: 100%; background: #f5f6f8; }
  #dr-root { height: 100%; }
  .dr-boot { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; color: #5b6572;
             padding: 40px; text-align: center; font-size: 14px; }
</style>
</head>
<body>
<!-- The standalone deep-research page: JUST this functionality. The same
     surface module the main app mounts in its overlay (src/research/surface.js)
     mounted full-screen — one UI, two hosts. Serve the repo statically
     (`npm run serve`) and open /deep-research.html. -->
<div id="dr-root"><div class="dr-boot">Loading the research surface…</div></div>
<script type="module">
  const root = document.getElementById('dr-root');
  try {
    const { mountResearchSurface } = await import(new URL('src/research/surface.js', document.baseURI).href);
    root.innerHTML = '';
    mountResearchSurface(root, {});
  } catch (e) {
    root.innerHTML = '<div class="dr-boot">Could not load the surface: ' +
      String(e && e.message || e).replace(/</g, '&lt;') +
      '<br><br>Serve this repo over http (<code>npm run serve</code>) — ES modules do not load from file://.</div>';
    console.error(e);
  }
</script>
</body>
</html>
